name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'worker.toml'
      - 'package.json'
      - 'tsconfig*.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy ezpath-router to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config worker.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
